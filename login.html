<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heir - Login</title>
    <link rel="stylesheet" type="text/css" href="styles.css">

    <style type="text/css">
        input:focus {
            background-color: #ffffcc;
        }
    </style>
</head>
<body>

    <div class="wrapper">

        <div class="header">
            <h1>Heir</h1>
            <p>Login Page</p>
        </div>

        <div class="menu">
            <a href="index.html">Home</a> |
            <a href="login.html">Login</a> |
            <a href="signup.html">Sign Up</a> |
            <a href="about.html">About Us</a>
        </div>

        <div class="sectionBox">
            <h2>Login</h2>

            <img src="heir.jpg" alt="Heir Image" usemap="#heirmaplogin" width="400" height="200" class="mainImage">

            <map name="heirmaplogin">
                <area shape="rect" coords="0,0,400,200" href="about.html" alt="About Us">
            </map>

            <form action="#" method="post">
                <p>
                    <label>Email:</label><br>
                    <input type="email" name="email" size="30" autofocus>
                </p>

                <p>
                    <label>Password:</label><br>
                    <input type="password" name="password" size="30">
                </p>

                <p>
                    <input type="checkbox" name="remember"> Remember me
                </p>

                <p>
                    <input type="submit" value="Login" style="color: white; background-color: darkblue;">
                </p>
            </form>
        </div>

        <div class="footer">
            <p>&copy; 2026 Heir</p>
        </div>

    </div>

</body>
</html>
